<!DOCTYPE html>
<html>
    <head>
        <title>OmniLab HUD // HOMES_CORE</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            :root {
                --bg-color: #000;
                --text-color: #00f2ff;
                --glow-color: #00f2ff;
                --warn-color: #ff00ff;
                --accent-color: #00ff00;
            }
            body.light-mode {
                --bg-color: #f0f0f0;
                --text-color: #1a1a1a;
                --glow-color: #0066cc;
            }
            body { 
                margin: 0; 
                overflow: hidden; 
                background: var(--bg-color); 
                color: var(--text-color);
                font-family: 'Courier New', monospace; 
                transition: background 0.3s, color 0.3s;
                text-transform: uppercase;
            }
            body.scanning {
                animation: scan-alert 0.5s infinite alternate;
            }
            @keyframes scan-alert {
                from { background: #000; }
                to { background: #001122; }
            }
            #ui-layer {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; padding: 20px;
                text-shadow: 0 0 10px var(--glow-color);
            }
            .scanline {
                width: 100%; height: 2px; background: rgba(0, 242, 245, 0.1);
                position: absolute; animation: scan 4s linear infinite;
            }
            @keyframes scan { from {top: 0;} to {top: 100%;} }
            
            #right-bottom-container {
                position: absolute; bottom: 20px; right: 20px;
                display: flex; flex-direction: column; align-items: flex-end;
                pointer-events: auto;
            }

            #control-panel {
                display: flex; gap: 8px; margin-bottom: 15px;
                flex-wrap: wrap; justify-content: flex-end;
                max-width: 350px;
            }

            .cmd-btn {
                background: rgba(0, 242, 255, 0.1);
                border: 1px solid var(--text-color);
                color: var(--text-color);
                padding: 8px 12px;
                font-family: 'Courier New', monospace;
                font-size: 0.75em;
                cursor: pointer;
                transition: 0.2s;
                text-transform: uppercase;
            }
            .cmd-btn:hover { background: var(--text-color); color: #000; box-shadow: 0 0 15px var(--glow-color); }
            .cmd-btn.special { border-color: var(--accent-color); color: var(--accent-color); }
            .cmd-btn.special:hover { background: var(--accent-color); color: #000; }
            .cmd-btn.warn:hover { background: var(--warn-color); border-color: var(--warn-color); }

            #diag-panel {
                font-size: 0.75em; text-align: right;
                border-right: 3px solid var(--text-color); padding-right: 15px;
                background: rgba(0,0,0,0.3);
                min-width: 220px;
            }

            #log-console {
                margin-top: 15px;
                font-size: 0.8em;
                max-width: 400px;
                height: 180px;
                overflow: hidden;
                background: rgba(0, 242, 255, 0.05);
                border-left: 1px solid var(--text-color);
                padding: 10px;
                display: flex;
                flex-direction: column-reverse;
            }
            .log-entry { margin-bottom: 5px; animation: fade 0.5s ease; }
            @keyframes fade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

            #mode-toggle {
                position: absolute; top: 20px; right: 20px;
                pointer-events: auto; background: none;
                border: 1px solid var(--text-color); color: var(--text-color);
                padding: 5px 10px; cursor: pointer; z-index: 100;
            }

            #demo-banner {
                position:absolute; top:10px; left:50%; transform:translateX(-50%); 
                color:var(--warn-color); font-size:0.8em; border:1px solid var(--warn-color); 
                padding:5px 20px; background:rgba(255,0,255,0.1); z-index:1000;
            }
        </style>
    </head>
    <body class="dark-mode">
        <button id="mode-toggle">THEME_SYNC</button>
        <div id="ui-layer">
            <div class="scanline"></div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 style="margin: 0;">OMNILAB // HOMES_OS</h2>
                    <div id="status">SYSTEM: STANDBY</div>
                    <div id="gesture-hint" style="font-size: 0.6em; color: var(--accent-color); opacity: 0.7;">WAKE_WORD: "HOMES"</div>
                </div>
            </div>

            <div id="log-console"></div>

            <div id="right-bottom-container">
                <div id="control-panel">
                    <button class="cmd-btn" onclick="sendCommand('analyze')">Scan</button>
                    <button class="cmd-btn special" onclick="sendCommand('analyze_and_search')">HOMES Search</button>
                    <button class="cmd-btn warn" onclick="sendCommand('close_browser')">Terminate</button>
                </div>
                <div id="diag-panel">
                    <div id="fps">FPS: 00</div>
                    <div id="mem-status" style="color: var(--accent-color); margin: 4px 0;">MEM: BUFFER_SYNC_ACTIVE</div>
                    <div id="model">CORE: GEMINI-3.1-LITE</div>
                </div>
            </div>
        </div>

        <script>
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const cursorGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const innerRing = new THREE.Mesh(new THREE.RingGeometry(0.8, 1, 32), ringMat);
            const outerRing = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.3, 4, 1), ringMat); 
            cursorGroup.add(innerRing, outerRing);
            scene.add(cursorGroup);

            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x002222);
            grid.rotation.x = Math.PI / 2;
            grid.position.z = -20;
            scene.add(grid);

            camera.position.z = 15;

            const statusEl = document.getElementById('status');
            const fpsEl = document.getElementById('fps');
            const logConsole = document.getElementById('log-console');

            // --- BROWSER VISION CORE (RENDER DEPLOY) ---
            let browserCameraStream = null;
            let cameraVideo = null;
            let captureCanvas = null;
            let isAnalyzing = false;

            async function ensureBrowserCamera() {
                if (browserCameraStream) return true;
                try {
                    browserCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" },
                        audio: false
                    });
                    cameraVideo = document.createElement("video");
                    cameraVideo.setAttribute("playsinline", "");
                    cameraVideo.muted = true;
                    cameraVideo.autoplay = true;
                    cameraVideo.srcObject = browserCameraStream;
                    await cameraVideo.play();
                    captureCanvas = document.createElement("canvas");
                    addLog("BROWSER_CAM: ONLINE", "var(--accent-color)");
                    statusEl.innerText = "SYSTEM: CAMERA_READY";
                    return true;
                } catch (err) {
                    addLog("BROWSER_CAM: ACCESS_DENIED", "var(--warn-color)");
                    statusEl.innerText = "SYSTEM: CAMERA_DENIED";
                    return false;
                }
            }

            async function captureFrameBase64() {
                if (!cameraVideo || !captureCanvas) return null;
                const w = cameraVideo.videoWidth || 640;
                const h = cameraVideo.videoHeight || 480;
                if (!w || !h) return null;
                captureCanvas.width = w;
                captureCanvas.height = h;
                const ctx = captureCanvas.getContext("2d");
                ctx.drawImage(cameraVideo, 0, 0, w, h);
                const dataUrl = captureCanvas.toDataURL("image/jpeg", 0.72);
                return dataUrl.split(",")[1];
            }

            async function runBrowserAnalyze(autoSearch = false) {
                if (isAnalyzing) return;
                isAnalyzing = true;
                try {
                    document.body.classList.add("scanning");
                    statusEl.innerText = "SCAN: CAPTURING_FRAME";
                    const ok = await ensureBrowserCamera();
                    if (!ok) {
                        addLog("ANALYSIS_ABORTED: NO_CAMERA", "var(--warn-color)");
                        return;
                    }
                    const imageBase64 = await captureFrameBase64();
                    if (!imageBase64) {
                        addLog("ANALYSIS_ABORTED: EMPTY_FRAME", "var(--warn-color)");
                        return;
                    }
                    addLog("VISION: FRAME_CAPTURED", "var(--text-color)");
                    statusEl.innerText = "SCAN: ANALYZING";
                    const res = await fetch("/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ image: imageBase64 })
                    });
                    const data = await res.json();
                    if (data.status === "success" && data.text) {
                        addLog(`ANALYSIS: ${data.text}`, "#fff");
                        speak(data.text);
                        statusEl.innerText = data.cached ? "SYSTEM: TRACKING (CACHED)" : "SYSTEM: TRACKING";
                        if (autoSearch) {
                            addLog("WEB: SEARCH REQUESTED", "var(--accent-color)");
                            if (ws && ws.readyState === WebSocket.OPEN) {
                                ws.send(JSON.stringify({ type: "command", command: "analyze_and_search" }));
                            }
                        }
                    } else {
                        addLog(`ANALYSIS_ERROR: ${data.message || "UNKNOWN"}`, "var(--warn-color)");
                        statusEl.innerText = "SYSTEM: ERROR";
                    }
                } catch (err) {
                    addLog(`NETWORK_ERROR: ${err.message}`, "var(--warn-color)");
                    statusEl.innerText = "SYSTEM: NETWORK_ERROR";
                } finally {
                    document.body.classList.remove("scanning");
                    isAnalyzing = false;
                }
            }

            function addLog(text, color = 'var(--text-color)') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.style.color = color;
                entry.innerText = `> ${text}`;
                logConsole.prepend(entry);
                if (logConsole.childNodes.length > 10) logConsole.lastChild.remove();
            }

            async function sendCommand(cmd) {
                addLog(`MANUAL_CMD: ${cmd.toUpperCase()}`, "var(--accent-color)");
                if (cmd === "analyze") {
                    await runBrowserAnalyze(false);
                    return;
                }
                if (cmd === "analyze_and_search") {
                    await runBrowserAnalyze(true);
                    return;
                }
                if (cmd === "close_browser") {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: "command", command: cmd }));
                        addLog("TERMINATE_SIGNAL: SENT", "var(--warn-color)");
                    } else {
                        addLog("TERMINATING_VIRTUAL_SESSION...", "var(--warn-color)");
                    }
                }
            }

            function speak(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 1.2;
                    utterance.pitch = 0.85; 
                    window.speechSynthesis.speak(utterance);
                }
            }

            let ws;
            let demoInterval = null;
            let lastDataTime = Date.now();

            function connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const isGitHub = window.location.host.includes('github.io');
                const host = isGitHub ? 'localhost:8000' : window.location.host;
                
                try {
                    ws = new WebSocket(`${protocol}//${host}/ws/hud`);
                    ws.onopen = () => {
                        addLog("CONNECTION_ESTABLISHED", "var(--accent-color)");
                        if (demoInterval) {
                            clearInterval(demoInterval);
                            demoInterval = null;
                            document.getElementById('demo-banner')?.remove();
                        }
                    };
                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === 'gesture') {
                            lastDataTime = Date.now();
                            updateHUD(data);
                        } else if (data.type === 'status_update') {
                            statusEl.innerText = data.message;
                            addLog(data.message, 'var(--warn-color)');
                        } else if (data.type === 'analysis_result') {
                            addLog(`ANALYSIS: ${data.text}`, '#fff');
                            speak(data.text);
                        }
                    };
                    ws.onclose = () => { if (!demoInterval) startDemoMode(); setTimeout(connect, 5000); };
                    ws.onerror = () => { if (!demoInterval) startDemoMode(); };
                } catch(e) {
                    startDemoMode();
                }
            }

            function startDemoMode() {
                if (demoInterval) return;
                addLog("VISION_OFFLINE: ENTERING_DEMO_MODE", "var(--warn-color)");
                
                const banner = document.createElement('div');
                banner.id = 'demo-banner';
                banner.innerText = "DEMO_MODE_ACTIVE // SIMULATED_DATA";
                document.body.appendChild(banner);

                let t = 0;
                demoInterval = setInterval(() => {
                    t += 0.05;
                    if (Date.now() - lastMouseTime > 2000) {
                        const demoData = {
                            x: 0.5 + Math.sin(t) * 0.3,
                            y: 0.5 + Math.cos(t * 0.7) * 0.2,
                            pinch_progress: 0,
                            fps: 60
                        };
                        updateHUD(demoData);
                    }
                }, 50);
            }

            let lastMouseTime = 0;
            window.addEventListener('mousemove', (e) => {
                lastMouseTime = Date.now();
                if (demoInterval || (ws && ws.readyState !== WebSocket.OPEN)) {
                    const data = {
                        x: e.clientX / window.innerWidth,
                        y: e.clientY / window.innerHeight,
                        fps: 60,
                        pinch_progress: 0
                    };
                    updateHUD(data);
                }
            });

            function updateHUD(data) {
                const targetX = (data.x - 0.5) * 30;
                const targetY = (0.5 - data.y) * 20;
                cursorGroup.position.x += (targetX - cursorGroup.position.x) * 0.3;
                cursorGroup.position.y += (targetY - cursorGroup.position.y) * 0.3;
                
                if (data.fps !== undefined) fpsEl.innerText = `FPS: ${data.fps}`;
                
                if (data.pinch_progress > 0) {
                    const p = data.pinch_progress;
                    ringMat.color.setRGB(p, 1-p, 1);
                    cursorGroup.scale.set(1 - (p*0.4), 1 - (p*0.4), 1);
                    statusEl.innerText = `SCAN_LOADING: ${Math.round(p*100)}%`;
                } else {
                    const isLight = document.body.classList.contains('light-mode');
                    ringMat.color.setHex(isLight ? 0x0066cc : 0x00f2ff);
                    cursorGroup.scale.set(1, 1, 1);
                    if (statusEl.innerText.includes("SCAN_LOADING")) statusEl.innerText = "SYSTEM: TRACKING";
                }
            }

            connect();

            // RECONHECIMENTO DE VOZ (HOMES MODE)
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'pt-BR';
                recognition.onresult = (event) => {
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            const transcript = event.results[i][0].transcript.toLowerCase().trim();
                            addLog(`USER: ${transcript}`);
                            if (transcript.includes("homes") || transcript.includes("pesquisar")) {
                                sendCommand('analyze_and_search');
                            }
                            else if (transcript.includes("analisar")) {
                                sendCommand('analyze');
                            }
                            else if (transcript.includes("fechar")) {
                                sendCommand('close_browser');
                            }
                        }
                    }
                };
                recognition.onend = () => { try { recognition.start(); } catch(e) {} };
                try { recognition.start(); } catch(e) {}
            }

            function animate() {
                requestAnimationFrame(animate);
                innerRing.rotation.z += 0.05;
                outerRing.rotation.z -= 0.02;
                renderer.render(scene, camera);
            }
            animate();

            document.getElementById('mode-toggle').onclick = () => document.body.classList.toggle('light-mode');
            window.onresize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
        </script>
    </body>
</html>
