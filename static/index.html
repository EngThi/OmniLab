<!DOCTYPE html>
<html>
    <head>
        <title>OmniLab HUD // HOMES_CORE_LOCAL</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            :root {
                --bg-color: #000;
                --text-color: #00f2ff;
                --glow-color: #00f2ff;
                --warn-color: #ff00ff;
                --accent-color: #00ff00;
            }
            body { 
                margin: 0; overflow: hidden; background: var(--bg-color); 
                color: var(--text-color); font-family: 'Courier New', monospace; 
                text-transform: uppercase;
            }
            #ui-layer {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; padding: 20px;
                text-shadow: 0 0 10px var(--glow-color); z-index: 10;
            }
            .scanline {
                width: 100%; height: 2px; background: rgba(0, 242, 245, 0.1);
                position: absolute; animation: scan 4s linear infinite;
            }
            @keyframes scan { from {top: 0;} to {top: 100%;} }
            
            #control-panel {
                position: absolute; bottom: 40px; right: 40px;
                display: flex; flex-direction: column; align-items: flex-end;
                pointer-events: auto; background: rgba(0, 0, 0, 0.5);
                padding: 15px; border-right: 2px solid var(--text-color);
            }
            
            #search-box {
                background: rgba(0,0,0,0.6); border: 1px solid var(--text-color);
                color: var(--text-color); padding: 10px; font-family: 'Courier New', monospace;
                width: 180px; font-size: 0.8em; outline: none; margin-bottom: 10px;
            }

            .cmd-btn {
                background: rgba(0, 242, 255, 0.1); border: 1px solid var(--text-color);
                color: var(--text-color); padding: 10px 16px; font-family: 'Courier New', monospace;
                font-size: 0.8em; cursor: pointer; margin-bottom: 8px; width: 180px;
                text-align: right; transition: 0.2s;
            }
            .cmd-btn:hover { background: var(--text-color); color: #000; transform: translateX(-5px); }
            .cmd-btn.special { border-color: var(--accent-color); color: var(--accent-color); }
            .cmd-btn.warn { border-color: var(--warn-color); color: var(--warn-color); }

            #log-console {
                margin-top: 15px; font-size: 0.8em; max-width: 450px; height: 300px;
                overflow-y: auto; border-left: 1px solid var(--text-color);
                padding: 10px; display: flex; flex-direction: column;
                background: rgba(0, 242, 255, 0.05);
            }
            .log-entry { margin-bottom: 8px; animation: fade 0.4s ease; word-wrap: break-word; }
            @keyframes fade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
            
            #diag-panel { font-size: 0.7em; text-align: right; margin-top: 10px; opacity: 0.8; }

            #browser-view {
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                width: 80%; height: 85%; background: rgba(0,0,0,0.9);
                border: 2px solid var(--text-color); display: none; flex-direction: column;
                z-index: 2000; pointer-events: auto;
                box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            }
            #browser-header { background: var(--text-color); color: #000; padding: 5px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8em; }
            #browser-container { 
                flex: 1; 
                width: 100%; 
                overflow-y: auto; 
                background: #111;
                scrollbar-width: thin;
                scrollbar-color: var(--text-color) transparent;
            }
            #browser-container::-webkit-scrollbar { width: 6px; }
            #browser-container::-webkit-scrollbar-thumb { background: var(--text-color); }
            #browser-content { width: 100%; display: block; height: auto; }
        </style>
    </head>
    <body>
        <div class="scanline"></div>
        <div id="ui-layer">
            <h2 style="margin: 0;">OMNILAB // CORE_LOCAL</h2>
            <div id="status">SYSTEM: STANDBY</div>
            <div id="log-console"></div>

            <div id="control-panel">
                <input type="text" id="search-box" placeholder="URL OR SEARCH..." />
                <button class="cmd-btn special" id="vision-btn" onclick="initVision()">INIT_SENSORS</button>
                <button class="cmd-btn" onclick="runAnalyze()">SCAN_ENV</button>
                <button class="cmd-btn special" onclick="sendCommand('analyze_and_search')">HOMES_SEARCH</button>
                <button class="cmd-btn warn" onclick="sendCommand('close_browser')">TERMINATE</button>
                
                <div id="diag-panel">
                    <div id="fps">FPS: 00</div>
                    <div id="geo" style="color: var(--accent-color); font-size: 0.9em; margin: 4px 0;">NODE: LOCAL_LAB [HOME]</div>
                    <div id="gesture-display" style="color: var(--accent-color)">GESTURE: NONE</div>
                    <div id="model">CORE: GEMINI-3.1-LOCAL</div>
                </div>
            </div>

            <div id="browser-view">
                <div id="browser-header">
                    <span>REMOTE_BROWSER_FEED</span>
                    <span onclick="hideBrowser()" style="cursor:pointer">[X]</span>
                </div>
                <div id="browser-container">
                    <img id="browser-content" src="" />
                </div>
            </div>
        </div>

        <script>
            // --- TELEMETRIA & LIMPEZA ---
            function cleanTacticalText(text) {
                if (!text) return "";
                return text.replace(/[\*#\-_\[\]\(\)>]/g, "").replace(/\s+/g, " ").trim().toUpperCase();
            }

            // --- THREE.JS HUD ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const cursorGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const innerRing = new THREE.Mesh(new THREE.RingGeometry(0.8, 1, 32), ringMat);
            const outerRing = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.3, 4, 1), ringMat);
            cursorGroup.add(innerRing, outerRing);
            scene.add(cursorGroup);
            
            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x002222);
            grid.rotation.x = Math.PI / 2; grid.position.z = -20;
            scene.add(grid);
            camera.position.z = 15;

            // --- VISION ENGINE (ES MODULES) ---
            let handLandmarker;
            let videoElement;
            let visionWs;
            let lastVideoTime = -1;
            let isLockActive = false;

            async function initVision() {
                addLog("INIT_SENSORS_PROTOCOL...", "var(--accent-color)");
                videoElement = document.createElement("video");
                videoElement.style.display = "none";
                videoElement.autoplay = true;
                document.body.appendChild(videoElement);

                try {
                    const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                    const { HandLandmarker, FilesetResolver } = vision;
                    const vision_wasm = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                    handLandmarker = await HandLandmarker.createFromOptions(vision_wasm, {
                        baseOptions: { 
                            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", 
                            delegate: "GPU" 
                        },
                        runningMode: "VIDEO", numHands: 1
                    });
                    addLog("MEDIAPIPE: ENGINE_READY", "var(--accent-color)");
                    startWebcam();
                } catch (e) {
                    addLog("VISION_ERROR: MODULE_FAILED", "var(--warn-color)");
                }
            }

            function startWebcam() {
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    addLog("CAMERA: ONLINE", "var(--accent-color)");
                    videoElement.srcObject = stream;
                    videoElement.onloadeddata = () => {
                        document.getElementById('vision-btn').innerText = "SENSORS: ACTIVE";
                        connectVisionWS();
                        requestAnimationFrame(predictWebcam);
                    };
                });
            }

            function connectVisionWS() {
                visionWs = new WebSocket(`ws://${window.location.host}/ws/vision`);
            }

            // --- GESTURES & SMOOTHING ---
            let framesProcessed = 0;
            let lastFpsTime = Date.now();
            let currentFps = 0;

            function predictWebcam() {
                let nowInMs = Date.now();
                if (videoElement.currentTime !== lastVideoTime) {
                    lastVideoTime = videoElement.currentTime;
                    const results = handLandmarker.detectForVideo(videoElement, nowInMs);
                    
                    framesProcessed++;
                    if (nowInMs - lastFpsTime > 1000) {
                        currentFps = framesProcessed;
                        framesProcessed = 0;
                        lastFpsTime = nowInMs;
                    }

                    if (results.landmarks && results.landmarks.length > 0) {
                        const l = results.landmarks[0];
                        const gesture = detectGestureType(l);
                        const gestureData = { 
                            type: "gesture", 
                            x: l[8].x, y: l[8].y, 
                            gesture: gesture.type, 
                            pinch_progress: gesture.pinch_progress,
                            fps: currentFps 
                        };
                        if (visionWs?.readyState === 1) visionWs.send(JSON.stringify(gestureData));
                        updateHUD(gestureData);
                    }
                }
                requestAnimationFrame(predictWebcam);
            }

            function detectGestureType(landmarks) {
                const thumb_tip = landmarks[4];
                const index_tip = landmarks[8];
                const middle_tip = landmarks[12];
                const wrist = landmarks[0];

                const dist_pinch = Math.hypot(thumb_tip.x - index_tip.x, thumb_tip.y - index_tip.y);
                const dist_fist = Math.hypot(index_tip.x - wrist.x, index_tip.y - wrist.y);

                if (dist_pinch < 0.04) return { type: "pinch", pinch_progress: 1.0 };
                if (dist_fist < 0.25) return { type: "fist", pinch_progress: 0 };
                if (thumb_tip.y < index_tip.y - 0.1) return { type: "thumbs_up", pinch_progress: 0 };
                
                return { type: "open", pinch_progress: 0 };
            }

            function updateHUD(data) {
                document.getElementById('gesture-display').innerText = `GESTURE: ${data.gesture.toUpperCase()}`;
                
                // --- LOCK TARGET LOGIC (FIST) ---
                if (data.gesture === "fist") {
                    isLockActive = true;
                    ringMat.color.setHex(0xff00ff);
                } else {
                    isLockActive = false;
                    ringMat.color.setHex(0x00f2ff);
                }

                // --- SMOOTHING ---
                const targetX = isLockActive ? 0 : ((1 - data.x) - 0.5) * 35;
                const targetY = isLockActive ? 0 : (0.5 - data.y) * 22;
                
                cursorGroup.position.x += (targetX - cursorGroup.position.x) * 0.12;
                cursorGroup.position.y += (targetY - cursorGroup.position.y) * 0.12;
                
                if (data.pinch_progress > 0.5) {
                    cursorGroup.scale.set(0.6, 0.6, 1);
                    outerRing.rotation.z += 0.2;
                } else {
                    cursorGroup.scale.set(1, 1, 1);
                }

                if (data.fps) document.getElementById('fps').innerText = `FPS: ${data.fps}`;
            }

            // --- WS HUD ---
            let ws;
            function connect() {
                ws = new WebSocket(`ws://${window.location.host}/ws/hud`);
                ws.onopen = () => addLog("SYSTEM: LOCAL_HUB_READY", "var(--accent-color)");
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'gesture') updateHUD(data);
                    else if (data.type === 'status_update') addLog(data.message, "var(--warn-color)");
                    else if (data.type === 'browser_screenshot') showBrowser(data.data);
                    else if (data.text) {
                        const cleanText = cleanTacticalText(data.text);
                        addLog(`ANALYSIS: ${cleanText}`, '#fff');
                        speak(cleanText);
                    }
                };
            }

            async function runAnalyze() {
                if (!videoElement) return;
                addLog("SCAN_INITIATED...", "var(--text-color)");
                const canvas = document.createElement("canvas");
                canvas.width = videoElement.videoWidth; canvas.height = videoElement.videoHeight;
                canvas.getContext("2d").drawImage(videoElement, 0, 0);
                const imageBase64 = canvas.toDataURL("image/jpeg", 0.72).split(",")[1];
                const res = await fetch("/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ image: imageBase64 }) });
                const data = await res.json();
                if (data.text) {
                    const cleanText = cleanTacticalText(data.text);
                    addLog(`ANALYSIS: ${cleanText}`, "#fff");
                    speak(cleanText);
                }
            }

            function sendCommand(cmd) {
                addLog(`CMD: ${cmd.toUpperCase()}`, "var(--accent-color)");
                if (cmd === "analyze_and_search") {
                    const searchVal = document.getElementById("search-box").value;
                    if (ws?.readyState === 1) ws.send(JSON.stringify({ type: "command", command: "analyze_and_search", query: searchVal || "" }));
                } else if (cmd === "close_browser" && ws?.readyState === 1) {
                    hideBrowser();
                    ws.send(JSON.stringify({ type: "command", command: cmd }));
                }
            }

            function speak(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 1.1; 
                    window.speechSynthesis.speak(utterance);
                }
            }

            function addLog(text, color = "var(--text-color)") {
                const console = document.getElementById('log-console');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = `> ${text}`;
                entry.style.color = color;
                console.appendChild(entry);
                console.scrollTop = console.scrollHeight;
            }

            function showBrowser(base64Data) {
                document.getElementById('browser-content').src = `data:image/jpeg;base64,${base64Data}`;
                document.getElementById('browser-view').style.display = 'flex';
            }
            function hideBrowser() { document.getElementById('browser-view').style.display = 'none'; }

            function animate() { 
                requestAnimationFrame(animate); 
                innerRing.rotation.z += 0.02;
                outerRing.rotation.z -= 0.01;
                renderer.render(scene, camera); 
            }
            animate();
            connect();
        </script>
    </body>
</html>
