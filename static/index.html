<!DOCTYPE html>
<html>
    <head>
        <title>OmniLab HUD // CORE_V2</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            :root {
                --bg-color: #000;
                --text-color: #00f2ff;
                --glow-color: #00f2ff;
                --warn-color: #ff00ff;
                --accent-color: #00ff00;
            }
            body.light-mode {
                --bg-color: #f0f0f0;
                --text-color: #1a1a1a;
                --glow-color: #0066cc;
            }
            body { 
                margin: 0; 
                overflow: hidden; 
                background: var(--bg-color); 
                color: var(--text-color);
                font-family: 'Courier New', monospace; 
                transition: background 0.3s, color 0.3s;
                text-transform: uppercase;
            }
            #ui-layer {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; padding: 20px;
                text-shadow: 0 0 10px var(--glow-color);
            }
            .scanline {
                width: 100%; height: 2px; background: rgba(0, 242, 245, 0.1);
                position: absolute; animation: scan 4s linear infinite;
            }
            @keyframes scan { from {top: 0;} to {top: 100%;} }
            
            /* Painel de Diagnóstico e Controle no Canto Direito */
            #right-bottom-container {
                position: absolute; bottom: 20px; right: 20px;
                display: flex; flex-direction: column; align-items: flex-end;
                pointer-events: auto;
            }

            #control-panel {
                display: flex; gap: 10px; margin-bottom: 15px;
            }

            .cmd-btn {
                background: rgba(0, 242, 255, 0.1);
                border: 1px solid var(--text-color);
                color: var(--text-color);
                padding: 8px 12px;
                font-family: 'Courier New', monospace;
                font-size: 0.8em;
                cursor: pointer;
                transition: 0.2s;
                text-transform: uppercase;
            }
            .cmd-btn:hover { background: var(--text-color); color: #000; box-shadow: 0 0 15px var(--glow-color); }
            .cmd-btn.warn:hover { background: var(--warn-color); border-color: var(--warn-color); }

            #diag-panel {
                font-size: 0.75em; text-align: right;
                border-right: 3px solid var(--text-color); padding-right: 15px;
                background: rgba(0,0,0,0.3);
                min-width: 200px;
            }

            #log-console {
                margin-top: 15px;
                font-size: 0.8em;
                max-width: 400px;
                height: 180px;
                overflow: hidden;
                background: rgba(0, 242, 255, 0.05);
                border-left: 1px solid var(--text-color);
                padding: 10px;
                display: flex;
                flex-direction: column-reverse;
            }
            .log-entry { margin-bottom: 5px; animation: fade 0.5s ease; }
            @keyframes fade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

            #mode-toggle {
                position: absolute; top: 20px; right: 20px;
                pointer-events: auto; background: none;
                border: 1px solid var(--text-color); color: var(--text-color);
                padding: 5px 10px; cursor: pointer; z-index: 100;
            }

            .scanning { animation: pulse 1s infinite !important; }
            @keyframes pulse {
                0% { box-shadow: inset 0 0 50px rgba(0, 242, 255, 0); }
                50% { box-shadow: inset 0 0 150px rgba(0, 242, 255, 0.3); }
                100% { box-shadow: inset 0 0 50px rgba(0, 242, 255, 0); }
            }
        </style>
    </head>
    <body class="dark-mode">
        <button id="mode-toggle">THEME_SYNC</button>
        <div id="ui-layer">
            <div class="scanline"></div>
            
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 style="margin: 0;">OMNILAB OS // v2.1.5</h2>
                    <div id="status">SYSTEM: STANDBY</div>
                    <div id="gesture-hint" style="font-size: 0.6em; color: var(--accent-color); opacity: 0.7;">PINCH_HOLD: DEEP_SCAN // MOUSE_INTERACT: ENABLED</div>
                </div>
            </div>

            <div id="log-console"></div>

            <div id="right-bottom-container">
                <!-- Button Panel -->
                <div id="control-panel">
                    <button class="cmd-btn" onclick="sendCommand('analyze')">Analyze</button>
                    <button class="cmd-btn" onclick="sendCommand('analyze_and_search')">Search</button>
                    <button class="cmd-btn warn" onclick="sendCommand('close_browser')">Terminate</button>
                </div>
                <!-- Diagnosis Panel -->
                <div id="diag-panel">
                    <div id="fps">FPS: 00</div>
                    <div id="mem-status" style="color: var(--accent-color); margin: 4px 0;">MEM: BUFFER_SYNC_ACTIVE</div>
                    <div id="model">CORE: GEMINI-3.1-LITE</div>
                </div>
            </div>
        </div>

        <script>
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const cursorGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const innerRing = new THREE.Mesh(new THREE.RingGeometry(0.8, 1, 32), ringMat);
            const outerRing = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.3, 4, 1), ringMat); 
            cursorGroup.add(innerRing, outerRing);
            scene.add(cursorGroup);

            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x002222);
            grid.rotation.x = Math.PI / 2;
            grid.position.z = -20;
            scene.add(grid);

            camera.position.z = 15;

            const statusEl = document.getElementById('status');
            const fpsEl = document.getElementById('fps');
            const logConsole = document.getElementById('log-console');

            function addLog(text, color = 'var(--text-color)') {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.style.color = color;
                entry.innerText = `> ${text}`;
                logConsole.prepend(entry);
                if (logConsole.childNodes.length > 10) logConsole.lastChild.remove();
            }

            function sendCommand(cmd) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    addLog(`MANUAL_CMD: ${cmd.toUpperCase()}`, "var(--accent-color)");
                    ws.send(JSON.stringify({type: 'command', command: cmd}));
                } else if (demoInterval) {
                    // MOCK EXECUTION FOR REVIEWER (NO SERVER)
                    addLog(`MOCK_CMD: ${cmd.toUpperCase()}`, "var(--warn-color)");
                    
                    if (cmd === 'analyze' || cmd === 'analyze_and_search') {
                        addLog("PROXY: INITIALIZING_PLAYWRIGHT_STEALTH...", "var(--text-color)");
                        setTimeout(() => {
                            if (cmd === 'analyze_and_search') addLog("WEB: SEARCHING_FOR_ENVIRONMENT_DATA...", "var(--accent-color)");
                            setTimeout(() => {
                                const mocks = [
                                    "IDENTIFIED: COMMUNICATION HUB. STATUS: OPERATIONAL.",
                                    "TARGET DETECTED IN PERIMETER. CORRELATING NETWORK DATA.",
                                    "SURFACE SCAN COMPLETE. NO THREATS DETECTED IN SECTOR.",
                                    "SEARCH DATA: 3 IOT DEVICES FOUND IN RANGE."
                                ];
                                const result = mocks[Math.floor(Math.random() * mocks.length)];
                                addLog(`ANALYSIS: ${result}`, "#fff");
                                speak(result);
                            }, 2000);
                        }, 1000);
                    } else if (cmd === 'close_browser') {
                        addLog("TERMINATING_VIRTUAL_SESSION...", "var(--warn-color)");
                    }
                }
            }

            function speak(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 1.2;
                    utterance.pitch = 0.85; 
                    window.speechSynthesis.speak(utterance);
                }
            }

            let ws;
            let demoInterval = null;
            let lastDataTime = Date.now();

            // VOICE RECOGNITION (JARVIS MODE)
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US'; // Changed to English for Reviewer
                recognition.onresult = (event) => {
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            const transcript = event.results[i][0].transcript.toLowerCase().trim();
                            addLog(`USER_VOICE: ${transcript}`);
                            if (transcript.includes("analyze")) sendCommand('analyze');
                            else if (transcript.includes("search")) sendCommand('analyze_and_search');
                            else if (transcript.includes("close") || transcript.includes("terminate")) sendCommand('close_browser');
                        }
                    }
                };
                recognition.onend = () => recognition.start();
                try { recognition.start(); } catch(e) {}
            }

            function animate() {
                requestAnimationFrame(animate);
                innerRing.rotation.z += 0.05;
                outerRing.rotation.z -= 0.02;
                renderer.render(scene, camera);
            }
            animate();

            function connect() {
                try {
                    ws = new WebSocket(`ws://${window.location.host}/ws/hud`);
                    ws.onopen = () => {
                        addLog("CONNECTION_ESTABLISHED", "var(--accent-color)");
                        checkDataFlow();
                    };
                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        if (data.type === 'gesture') {
                            lastDataTime = Date.now();
                            if (demoInterval) {
                                clearInterval(demoInterval);
                                demoInterval = null;
                                document.getElementById('demo-banner')?.remove();
                                addLog("VISION_SIGNAL_RESTORED", "var(--accent-color)");
                            }
                            updateHUD(data);
                        } else if (data.type === 'status_update') {
                            statusEl.innerText = data.message;
                            addLog(data.message, 'var(--warn-color)');
                        } else if (data.type === 'analysis_result') {
                            addLog(`ANALYSIS: ${data.text}`, '#fff');
                            speak(data.text);
                        }
                    };
                    ws.onclose = () => {
                        setTimeout(connect, 2000);
                        if (!demoInterval) startDemoMode();
                    };
                    ws.onerror = () => {
                        if (!demoInterval) startDemoMode();
                    };
                } catch (e) {
                    console.warn("WebSocket Connection Failed (Possible Mixed Content). Entering Demo Mode.");
                    if (!demoInterval) startDemoMode();
                }
            }

            connect();

            function checkDataFlow() {
                setInterval(() => {
                    if (Date.now() - lastDataTime > 2000 && !demoInterval) {
                        startDemoMode();
                    }
                }, 1000);
            }

            function startDemoMode() {
                if (demoInterval) return;
                addLog("VISION_OFFLINE: ENTERING_DEMO_MODE", "var(--warn-color)");
                
                // Add Visual Banner for Reviewer
                const banner = document.createElement('div');
                banner.id = 'demo-banner';
                banner.style = "position:absolute; top:10px; left:50%; transform:translateX(-50%); color:var(--warn-color); font-size:0.8em; border:1px solid var(--warn-color); padding:5px 20px; background:rgba(255,0,255,0.1); z-index:1000;";
                banner.innerText = "DEMO_MODE_ACTIVE // SIMULATED_DATA";
                document.body.appendChild(banner);

                let t = 0;
                demoInterval = setInterval(() => {
                    t += 0.05;
                    // Background tactical ping simulation
                    if (Math.random() > 0.99) addLog("BACKGROUND_SCAN: NOMINAL", "rgba(0,242,255,0.3)");
                }, 50);
            }

            function updateHUD(data) {
                const targetX = (data.x - 0.5) * 30;
                const targetY = (0.5 - data.y) * 20;
                cursorGroup.position.x += (targetX - cursorGroup.position.x) * 0.3;
                cursorGroup.position.y += (targetY - cursorGroup.position.y) * 0.3;
                
                if (data.fps) fpsEl.innerText = `FPS: ${data.fps}`;
                
                if (data.pinch_progress > 0) {
                    const p = data.pinch_progress;
                    ringMat.color.setRGB(p, 1-p, 1);
                    cursorGroup.scale.set(1 - (p*0.4), 1 - (p*0.4), 1);
                    statusEl.innerText = `SCAN_LOADING: ${Math.round(p*100)}%`;
                } else {
                    const isLight = document.body.classList.contains('light-mode');
                    ringMat.color.setHex(isLight ? 0x0066cc : 0x00f2ff);
                    cursorGroup.scale.set(1, 1, 1);
                    if (statusEl.innerText.includes("SCAN_LOADING")) statusEl.innerText = "SYSTEM: TRACKING";
                }
            }

            // MOUSE TRACKING FOR DEMO MODE
            window.addEventListener('mousemove', (e) => {
                if (demoInterval) {
                    const fakeData = {
                        x: e.clientX / window.innerWidth,
                        y: e.clientY / window.innerHeight,
                        fps: 60,
                        pinch_progress: 0
                    };
                    updateHUD(fakeData);
                }
            });

            document.getElementById('mode-toggle').onclick = () => document.body.classList.toggle('light-mode');
            window.onresize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
        </script>
    </body>
</html>
