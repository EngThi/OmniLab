<!DOCTYPE html>
<html>
    <head>
        <title>OmniLab HUD // HOMES_CORE</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            :root {
                --bg-color: #000;
                --text-color: #00f2ff;
                --glow-color: #00f2ff;
                --warn-color: #ff00ff;
                --accent-color: #00ff00;
            }
            body { 
                margin: 0; overflow: hidden; background: var(--bg-color); 
                color: var(--text-color); font-family: 'Courier New', monospace; 
                text-transform: uppercase;
            }
            #ui-layer {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; padding: 20px;
                text-shadow: 0 0 10px var(--glow-color); z-index: 10;
            }
            .scanline {
                width: 100%; height: 2px; background: rgba(0, 242, 245, 0.1);
                position: absolute; animation: scan 4s linear infinite;
            }
            @keyframes scan { from {top: 0;} to {top: 100%;} }
            
            #control-panel {
                position: absolute; bottom: 40px; right: 40px;
                display: flex; flex-direction: column; align-items: flex-end;
                pointer-events: auto; background: rgba(0, 0, 0, 0.5);
                padding: 15px; border-right: 2px solid var(--text-color);
            }
            
            #search-box {
                background: rgba(0,0,0,0.6);
                border: 1px solid var(--text-color);
                color: var(--text-color);
                padding: 10px;
                font-family: 'Courier New', monospace;
                width: 180px;
                font-size: 0.8em;
                outline: none;
                margin-bottom: 10px;
                box-sizing: border-box;
            }

            .cmd-btn {
                background: rgba(0, 242, 255, 0.1); border: 1px solid var(--text-color);
                color: var(--text-color); padding: 10px 16px; font-family: 'Courier New', monospace;
                font-size: 0.8em; cursor: pointer; margin-bottom: 8px; width: 180px;
                text-align: right; transition: 0.2s;
            }
            .cmd-btn:hover { background: var(--text-color); color: #000; transform: translateX(-5px); }
            .cmd-btn.special { border-color: var(--accent-color); color: var(--accent-color); }
            .cmd-btn.warn { border-color: var(--warn-color); color: var(--warn-color); }
            .cmd-btn.warn:hover { background: var(--warn-color); color: #000; }

            #log-console {
                margin-top: 15px; font-size: 0.8em; max-width: 450px; height: 300px;
                overflow-y: auto; border-left: 1px solid var(--text-color);
                padding: 10px; display: flex; flex-direction: column;
                background: rgba(0, 242, 255, 0.05);
                scrollbar-width: thin; scrollbar-color: var(--text-color) transparent;
            }
            #log-console::-webkit-scrollbar { width: 4px; }
            #log-console::-webkit-scrollbar-thumb { background: var(--text-color); }

            .log-entry { margin-bottom: 8px; animation: fade 0.4s ease; line-height: 1.4; word-wrap: break-word; }
            @keyframes fade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
            
            #diag-panel { font-size: 0.7em; text-align: right; margin-top: 10px; opacity: 0.8; }

            #browser-view {
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                width: 80%; height: 70%;
                background: rgba(0,0,0,0.9);
                border: 2px solid var(--text-color);
                display: none;
                flex-direction: column;
                z-index: 2000;
                pointer-events: auto;
            }

            #browser-header {
                background: var(--text-color); color: #000; padding: 5px 15px;
                display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8em;
            }
            #close-browser-view { cursor: pointer; }
            #browser-content { flex: 1; width: 100%; object-fit: contain; background: #111; }
        </style>
    </head>
    <body>
        <div class="scanline"></div>
        <div id="ui-layer">
            <h2 style="margin: 0;">OMNILAB // HOMES_OS</h2>
            <div id="status">SYSTEM: STANDBY</div>
            <div id="log-console"></div>

            <div id="control-panel">
                <input type="text" id="search-box" placeholder="URL OR SEARCH..." />
                <button class="cmd-btn special" id="vision-btn" onclick="forceStartVision()">START_SENSORS</button>
                <button class="cmd-btn" onclick="runAnalyze(false)">SCAN ENVIRONMENT</button>
                <button class="cmd-btn special" onclick="sendCommand('analyze_and_search')">HOMES SEARCH</button>
                <button class="cmd-btn warn" onclick="sendCommand('close_browser')">TERMINATE</button>
                
                <div id="diag-panel">
                    <div id="fps">FPS: 00</div>
                    <div id="model">CORE: GEMINI-3.1-LITE</div>
                </div>
            </div>

            <div id="browser-view">
                <div id="browser-header">
                    <span>REMOTE_BROWSER_FEED</span>
                    <span id="close-browser-view" onclick="hideBrowser()">[X]</span>
                </div>
                <img id="browser-content" src="" />
            </div>
        </div>

        <script>
            // --- TELEMETRIA & LIMPEZA ---
            function remoteLog(msg, level = "INFO") {
                console.log(`[${level}] ${msg}`);
                fetch("/debug/log", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ level, message: msg })
                }).catch(() => {});
            }

            function cleanTacticalText(text) {
                if (!text) return "";
                // Remove Markdown (*, _, #, -, [, ], etc) e limpa espaços extras
                return text.replace(/[\*#\-_\[\]\(\)>]/g, "")
                           .replace(/\s+/g, " ")
                           .trim()
                           .toUpperCase();
            }

            // --- THREE.JS HUD ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const cursorGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            cursorGroup.add(new THREE.Mesh(new THREE.RingGeometry(0.8, 1, 32), ringMat));
            cursorGroup.add(new THREE.Mesh(new THREE.RingGeometry(1.2, 1.3, 4, 1), ringMat));
            scene.add(cursorGroup);
            
            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x002222);
            grid.rotation.x = Math.PI / 2; grid.position.z = -20;
            scene.add(grid);
            camera.position.z = 15;

            // --- VISION ENGINE ---
            let handLandmarker;
            let videoElement;
            let visionWs;
            let lastVideoTime = -1;
            let isVisionActive = false;

            async function forceStartVision() {
                if (isVisionActive) return;
                isVisionActive = true;
                initVisionFrontend();
            }

            async function initVisionFrontend() {
                remoteLog("INIT_VISION_START", "INFO");
                addLog("INIT_VISION_PROTOCOL...", "var(--accent-color)");
                
                videoElement = document.createElement("video");
                videoElement.style.display = "none";
                videoElement.autoplay = true;
                document.body.appendChild(videoElement);

                try {
                    const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                    const { HandLandmarker, FilesetResolver } = vision;
                    const vision_wasm = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                    handLandmarker = await HandLandmarker.createFromOptions(vision_wasm, {
                        baseOptions: { 
                            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", 
                            delegate: "GPU" 
                        },
                        runningMode: "VIDEO", numHands: 1
                    });
                    remoteLog("MEDIAPIPE_READY", "INFO");
                    addLog("MEDIAPIPE: ENGINE_READY", "var(--accent-color)");
                    startWebcam();
                } catch (e) {
                    remoteLog(`MEDIAPIPE_ERROR: ${e.message}`, "CRITICAL");
                    addLog("VISION_ERROR: MODULE_IMPORT_FAILED", "var(--warn-color)");
                    isVisionActive = false;
                }
            }

            function startWebcam() {
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    addLog("CAMERA: ONLINE", "var(--accent-color)");
                    videoElement.srcObject = stream;
                    videoElement.onloadeddata = () => {
                        document.getElementById('vision-btn').innerText = "SENSORS: ACTIVE";
                        document.getElementById('status').innerText = "SYSTEM: TRACKING";
                        connectVisionWS();
                        requestAnimationFrame(predictWebcam);
                    };
                }).catch(e => addLog("CAMERA: PERMISSION_DENIED", "var(--warn-color)"));
            }

            function connectVisionWS() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                visionWs = new WebSocket(`${protocol}//${window.location.host}/ws/vision`);
            }

            let framesProcessed = 0;
            let lastFpsTime = Date.now();
            let currentFps = 0;

            function predictWebcam() {
                let nowInMs = Date.now();
                if (videoElement.currentTime !== lastVideoTime) {
                    lastVideoTime = videoElement.currentTime;
                    const results = handLandmarker.detectForVideo(videoElement, nowInMs);
                    framesProcessed++;
                    if (nowInMs - lastFpsTime > 1000) {
                        currentFps = framesProcessed;
                        framesProcessed = 0;
                        lastFpsTime = nowInMs;
                    }
                    if (results.landmarks && results.landmarks.length > 0) {
                        const l = results.landmarks[0][8];
                        const gestureData = { type: "gesture", x: l.x, y: l.y, gesture: "open", fps: currentFps };
                        if (visionWs?.readyState === 1) visionWs.send(JSON.stringify(gestureData));
                        updateHUD(gestureData);
                    }
                }
                requestAnimationFrame(predictWebcam);
            }

            function updateHUD(data) {
                const targetX = ((1 - data.x) - 0.5) * 35;
                const targetY = (0.5 - data.y) * 22;
                cursorGroup.position.x += (targetX - cursorGroup.position.x) * 0.08;
                cursorGroup.position.y += (targetY - cursorGroup.position.y) * 0.08;
                if (data.fps !== undefined) document.getElementById('fps').innerText = `FPS: ${data.fps}`;
            }

            // --- WS HUD ---
            let ws;
            function connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws/hud`);
                ws.onopen = () => addLog("HUD_CONNECTED: SYNC_READY", "var(--accent-color)");
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'gesture') updateHUD(data);
                    else if (data.type === 'status_update') {
                        document.getElementById('status').innerText = data.message;
                        addLog(data.message, "var(--warn-color)");
                    } else if (data.type === 'browser_screenshot') {
                        showBrowser(data.data);
                    } else if (data.type === 'analysis_result' || data.text) {
                        const rawText = data.text || data.message;
                        const cleanText = cleanTacticalText(rawText);
                        addLog(`ANALYSIS: ${cleanText}`, '#fff');
                        speak(cleanText);
                    }
                };
                ws.onclose = () => setTimeout(connect, 3000);
            }

            // --- COMANDOS & ANÁLISE ---
            async function runAnalyze(autoSearch = false) {
                if (!videoElement || !videoElement.srcObject) {
                    addLog("SCAN_ERROR: SENSORS_OFFLINE", "var(--warn-color)");
                    return;
                }
                addLog("SCAN_INITIATED...", "var(--text-color)");
                document.getElementById('status').innerText = "SCAN: CAPTURING";
                
                try {
                    const canvas = document.createElement("canvas");
                    canvas.width = videoElement.videoWidth || 640;
                    canvas.height = videoElement.videoHeight || 480;
                    canvas.getContext("2d").drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const imageBase64 = canvas.toDataURL("image/jpeg", 0.72).split(",")[1];

                    document.getElementById('status').innerText = "SCAN: ANALYZING";
                    const res = await fetch("/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ image: imageBase64 })
                    });
                    const data = await res.json();
                    if (data.status === "success" && data.text) {
                        const cleanText = cleanTacticalText(data.text);
                        addLog(`ANALYSIS: ${cleanText}`, "#fff");
                        speak(cleanText);
                        document.getElementById('status').innerText = "SYSTEM: TRACKING";
                        if (autoSearch) sendCommand('analyze_and_search');
                    }
                } catch (err) { addLog(`SCAN_ERROR: ${err.message}`, "var(--warn-color)"); }
            }

            function sendCommand(cmd) {
                addLog(`CMD: ${cmd.toUpperCase()}`, "var(--accent-color)");
                if (cmd === "analyze_and_search") {
                    const searchVal = document.getElementById("search-box").value;
                    if (searchVal && ws?.readyState === 1) {
                        ws.send(JSON.stringify({ type: "command", command: "analyze_and_search", query: searchVal }));
                    } else { runAnalyze(true); }
                } else if (cmd === "close_browser" && ws?.readyState === 1) {
                    hideBrowser();
                    ws.send(JSON.stringify({ type: "command", command: cmd }));
                }
            }

            function speak(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 1.1; // 0.1 mais lento que o normal (1.2)
                    utterance.pitch = 0.85; 
                    window.speechSynthesis.speak(utterance);
                }
            }

            function addLog(text, color = "var(--text-color)") {
                const console = document.getElementById('log-console');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = `> ${text}`;
                entry.style.color = color;
                console.appendChild(entry);
                console.scrollTop = console.scrollHeight; // Auto-scroll
                if (console.childNodes.length > 50) console.firstChild.remove();
            }

            function hideBrowser() { document.getElementById('browser-view').style.display = 'none'; }
            function showBrowser(base64Data) {
                const img = document.getElementById('browser-content');
                img.src = `data:image/jpeg;base64,${base64Data}`;
                document.getElementById('browser-view').style.display = 'flex';
                addLog("BROWSER_FEED: UPDATED", "var(--accent-color)");
            }

            function animate() { 
                requestAnimationFrame(animate); 
                cursorGroup.children[0].rotation.z += 0.02;
                cursorGroup.children[1].rotation.z -= 0.01;
                renderer.render(scene, camera); 
            }
            animate();
            connect();
            window.onresize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
        </script>
    </body>
</html>
