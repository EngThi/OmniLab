<!DOCTYPE html>
<html>
    <head>
        <title>OmniLab HUD // HOMES_CORE</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <style>
            :root {
                --bg-color: #000;
                --text-color: #00f2ff;
                --glow-color: #00f2ff;
                --warn-color: #ff00ff;
                --accent-color: #00ff00;
            }
            body { 
                margin: 0; overflow: hidden; background: var(--bg-color); 
                color: var(--text-color); font-family: 'Courier New', monospace; 
                text-transform: uppercase;
            }
            #ui-layer {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                pointer-events: none; padding: 20px;
                text-shadow: 0 0 10px var(--glow-color); z-index: 10;
            }
            .scanline {
                width: 100%; height: 2px; background: rgba(0, 242, 245, 0.1);
                position: absolute; animation: scan 4s linear infinite;
            }
            @keyframes scan { from {top: 0;} to {top: 100%;} }
            
            #control-panel {
                position: absolute; bottom: 40px; right: 40px;
                display: flex; flex-direction: column; align-items: flex-end;
                pointer-events: auto; background: rgba(0, 0, 0, 0.5);
                padding: 15px; border-right: 2px solid var(--text-color);
            }
            
            #search-box {
                background: rgba(0,0,0,0.6); border: 1px solid var(--text-color);
                color: var(--text-color); padding: 10px; font-family: 'Courier New', monospace;
                width: 180px; font-size: 0.8em; outline: none; margin-bottom: 10px; box-sizing: border-box;
            }

            .cmd-btn {
                background: rgba(0, 242, 255, 0.1); border: 1px solid var(--text-color);
                color: var(--text-color); padding: 10px 16px; font-family: 'Courier New', monospace;
                font-size: 0.8em; cursor: pointer; margin-bottom: 8px; width: 180px;
                text-align: right; transition: 0.2s;
            }
            .cmd-btn:hover { background: var(--text-color); color: #000; transform: translateX(-5px); }
            .cmd-btn.special { border-color: var(--accent-color); color: var(--accent-color); }
            .cmd-btn.warn { border-color: var(--warn-color); color: var(--warn-color); }
            .cmd-btn.active { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-color); }

            #log-console {
                margin-top: 15px; font-size: 0.8em; max-width: 450px; height: 300px;
                overflow-y: auto; border-left: 1px solid var(--text-color);
                padding: 10px; display: flex; flex-direction: column;
                background: rgba(0, 242, 255, 0.05);
                scrollbar-width: thin; scrollbar-color: var(--text-color) transparent;
            }
            .log-entry { margin-bottom: 8px; animation: fade 0.4s ease; line-height: 1.4; word-wrap: break-word; }
            @keyframes fade { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
            
            #diag-panel { font-size: 0.7em; text-align: right; margin-top: 10px; opacity: 0.8; }

            #browser-view {
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                width: 80%; height: 85%; background: rgba(0,0,0,0.9);
                border: 2px solid var(--text-color); display: none; flex-direction: column;
                z-index: 2000; pointer-events: auto; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            }
            #browser-header { background: var(--text-color); color: #000; padding: 5px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8em; }
            #browser-container { flex: 1; width: 100%; overflow-y: auto; background: #111; }
            #browser-content { width: 100%; display: block; height: auto; }

            #flash-effect {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: #fff; opacity: 0; pointer-events: none; z-index: 9999;
            }
        </style>
    </head>
    <body>
        <div id="flash-effect"></div>
        <div class="scanline"></div>
        <div id="ui-layer">
            <h2 style="margin: 0;">OMNILAB // HOMES_OS</h2>
            <div id="status">SYSTEM: STANDBY</div>
            <div id="log-console"></div>

            <div id="control-panel">
                <input type="text" id="search-box" placeholder="URL OR SEARCH..." />
                <button class="cmd-btn" id="mic-btn" onclick="toggleMic()">VOICE: OFFLINE</button>
                <button class="cmd-btn special" id="vision-btn" onclick="toggleVision()">START_SENSORS</button>
                <button class="cmd-btn" onclick="runAnalyze(false)">SCAN ENVIRONMENT</button>
                <button class="cmd-btn special" onclick="sendCommand('analyze_and_search')">HOMES SEARCH</button>
                <button class="cmd-btn warn" onclick="sendCommand('close_browser')">TERMINATE</button>
                
                <div id="diag-panel">
                    <div id="fps">FPS: 00</div>
                    <div id="gesture-display" style="color: var(--accent-color); font-weight: bold;">GESTURE: NONE</div>
                    <div id="model">CORE: GEMINI-3.1-LITE</div>
                </div>
            </div>

            <div id="browser-view">
                <div id="browser-header"><span>REMOTE_BROWSER_FEED</span><span onclick="hideBrowser()" style="cursor:pointer">[X]</span></div>
                <div id="browser-container"><img id="browser-content" src="" /></div>
            </div>
        </div>

        <script>
            let lastSuggestedQuery = "";
            let recognition;
            let isMicActive = false;

            // --- RECOGNITION SETUP ---
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                recognition.onstart = () => {
                    isMicActive = true;
                    document.getElementById('mic-btn').innerText = "VOICE: LISTENING";
                    document.getElementById('mic-btn').classList.add('active');
                    addLog("NEURAL_VOICE_LINK: ESTABLISHED", "var(--accent-color)");
                };
                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    }
                    if (finalTranscript) {
                        const cmd = finalTranscript.toLowerCase().trim();
                        addLog(`USER: ${cmd.toUpperCase()}`, "#fff");
                        processVoiceCommand(cmd);
                    }
                };
                recognition.onend = () => { if (isMicActive) recognition.start(); };
            }

            function toggleMic() { if (isMicActive) stopMic(); else startMic(); }
            function startMic() { if (recognition) recognition.start(); else addLog("VOICE_ERROR: NOT_SUPPORTED", "var(--warn-color)"); }
            function stopMic() {
                isMicActive = false; if (recognition) recognition.stop();
                document.getElementById('mic-btn').innerText = "VOICE: OFFLINE";
                document.getElementById('mic-btn').classList.remove('active');
                addLog("NEURAL_VOICE_LINK: DISCONNECTED", "var(--warn-color)");
            }

            function processVoiceCommand(cmd) {
                if (cmd.includes("analyze") || cmd.includes("analyse") || cmd.includes("scan")) {
                    runAnalyze(false);
                } else if ((cmd === "yes" || cmd.includes("search") || cmd.includes("confirm")) && lastSuggestedQuery) {
                    executeSearch(lastSuggestedQuery);
                } else if (cmd.includes("search") || cmd.includes("find")) {
                    const q = cmd.replace("search", "").replace("find", "").replace("for", "").trim();
                    if (q) executeSearch(q);
                } else if (cmd.includes("terminate") || cmd.includes("stop") || cmd.includes("reset")) {
                    sendCommand("close_browser");
                }
            }

            function executeSearch(q) {
                document.getElementById("search-box").value = q;
                addLog(`EXECUTING_RESEARCH: [${q.toUpperCase()}]`, "var(--accent-color)");
                sendCommand("analyze_and_search");
                lastSuggestedQuery = "";
            }

            // --- THREE.JS HUD ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const cursorGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            cursorGroup.add(new THREE.Mesh(new THREE.RingGeometry(0.8, 1, 32), ringMat));
            cursorGroup.add(new THREE.Mesh(new THREE.RingGeometry(1.2, 1.3, 4, 1), ringMat));
            
            // Charging Ring (Energy Ring)
            const chargeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            const chargeRing = new THREE.Mesh(new THREE.RingGeometry(1.05, 1.15, 32, 1, 0, 0.0001), chargeMat);
            cursorGroup.add(chargeRing);
            scene.add(cursorGroup);
            
            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x002222);
            grid.rotation.x = Math.PI / 2; grid.position.z = -20;
            scene.add(grid);
            camera.position.z = 15;

            // --- VISION (ROBUST DETECT) ---
            let handLandmarker;
            let videoElement;
            let visionWs;
            let lastVideoTime = -1;
            let isVisionActive = false;
            let lastGestureTime = 0;
            let cameraStream = null;

            let pinchHoldStart = 0;
            let fistHoldStart = 0;
            const PINCH_CHARGE_TIME = 1500;
            const FIST_RESET_TIME = 1500; // Sensibilidade aumentada

            async function preloadModels() {
                try {
                    const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                    const { HandLandmarker, FilesetResolver } = vision;
                    const vision_wasm = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                    handLandmarker = await HandLandmarker.createFromOptions(vision_wasm, {
                        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                        runningMode: "VIDEO", numHands: 1
                    });
                    addLog("NEURAL_ENGINE: PRELOADED", "var(--accent-color)");
                } catch (e) { console.error("Preload failed", e); }
            }
            preloadModels();

            async function toggleVision() { if (isVisionActive) stopVision(); else startVision(); }
            async function startVision() {
                if (!handLandmarker) await preloadModels();
                isVisionActive = true;
                addLog("INIT_VISION_PROTOCOL...", "var(--accent-color)");
                if (!videoElement) {
                    videoElement = document.createElement("video");
                    videoElement.style.display = "none"; videoElement.autoplay = true;
                    document.body.appendChild(videoElement);
                }
                navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                    cameraStream = stream; videoElement.srcObject = stream;
                    videoElement.onloadeddata = () => {
                        document.getElementById('vision-btn').innerText = "SENSORS: ACTIVE";
                        document.getElementById('vision-btn').classList.add('active');
                        document.getElementById('status').innerText = "SYSTEM: TRACKING";
                        connectVisionWS();
                        requestAnimationFrame(predictWebcam);
                        addLog("CAMERA: ONLINE", "var(--accent-color)");
                    };
                }).catch(e => { addLog("CAMERA: DENIED", "var(--warn-color)"); isVisionActive = false; });
            }

            function stopVision() {
                isVisionActive = false;
                if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
                if (visionWs) { visionWs.close(); visionWs = null; }
                document.getElementById('vision-btn').innerText = "START_SENSORS";
                document.getElementById('vision-btn').classList.remove('active');
                document.getElementById('status').innerText = "SYSTEM: STANDBY";
                addLog("SENSORS: TERMINATED", "var(--warn-color)");
            }

            function connectVisionWS() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                visionWs = new WebSocket(`${protocol}//${window.location.host}/ws/vision`);
            }

            function predictWebcam() {
                if (!isVisionActive) return;
                let now = Date.now();
                if (videoElement.currentTime !== lastVideoTime) {
                    lastVideoTime = videoElement.currentTime;
                    const results = handLandmarker.detectForVideo(videoElement, now);
                    if (results.landmarks && results.landmarks.length > 0) {
                        const marks = results.landmarks[0];
                        const l = marks[8];
                        const gestureData = { type: "gesture", x: l.x, y: l.y, gesture: "open", charge: 0 };
                        
                        // --- HEURÍSTICAS ROBUSTAS ---
                        
                        // 1. PINCH (Indicador + Polegar)
                        const distPinch = Math.hypot(marks[4].x - marks[8].x, marks[4].y - marks[8].y);
                        
                        // 2. FIST (Média de todos os dedos contra o pulso)
                        const distFist = (
                            Math.hypot(marks[8].x - marks[0].x, marks[8].y - marks[0].y) +
                            Math.hypot(marks[12].x - marks[0].x, marks[12].y - marks[0].y) +
                            Math.hypot(marks[16].x - marks[0].x, marks[16].y - marks[0].y) +
                            Math.hypot(marks[20].x - marks[0].x, marks[20].y - marks[0].y)
                        ) / 4;

                        // 3. THUMBS UP (Polegar alto, outros baixos)
                        const isThumbsUp = marks[4].y < marks[5].y && marks[8].y > marks[5].y && marks[12].y > marks[9].y;

                        if (distPinch < 0.045) gestureData.gesture = "pinch";
                        else if (distFist < 0.28) gestureData.gesture = "fist"; // Threshold maior = mais fácil
                        else if (isThumbsUp) gestureData.gesture = "thumbs_up";

                        // --- GESTURE ACTIONS ---
                        if (gestureData.gesture === "fist") {
                            if (!fistHoldStart) fistHoldStart = now;
                            const progress = (now - fistHoldStart) / FIST_RESET_TIME;
                            gestureData.charge = progress;
                            if (progress >= 1) {
                                addLog("CRITICAL: PHYSICAL_PURGE_TRIGGERED", "var(--warn-color)");
                                sendCommand("close_browser");
                                fistHoldStart = 0;
                            }
                        } else { fistHoldStart = 0; }

                        if (gestureData.gesture === "pinch" && lastSuggestedQuery) {
                            if (!pinchHoldStart) pinchHoldStart = now;
                            const progress = (now - pinchHoldStart) / PINCH_CHARGE_TIME;
                            gestureData.charge = progress;
                            if (progress >= 1) {
                                executeSearch(lastSuggestedQuery);
                                pinchHoldStart = 0;
                            }
                        } else if (gestureData.gesture !== "fist") { pinchHoldStart = 0; }

                        if (gestureData.gesture === "thumbs_up" && now - lastGestureTime > 3000) {
                            addLog("GESTURE_CMD: AUTO_SCAN", "var(--accent-color)");
                            runAnalyze(false);
                            lastGestureTime = now;
                        }

                        if (visionWs?.readyState === 1) visionWs.send(JSON.stringify(gestureData));
                        updateHUD(gestureData);
                    }
                }
                requestAnimationFrame(predictWebcam);
            }

            function updateHUD(data) {
                document.getElementById('gesture-display').innerText = `GESTURE: ${data.gesture.toUpperCase()}`;
                let targetX = ((1 - data.x) - 0.5) * 35;
                let targetY = (0.5 - data.y) * 22;

                // Update Charge Ring
                chargeRing.geometry.dispose();
                const arc = (data.charge || 0) * Math.PI * 2;
                chargeRing.geometry = new THREE.RingGeometry(1.05, 1.15, 32, 1, 0, arc || 0.0001);

                if (data.gesture === "fist") {
                    targetX = 0; targetY = 0;
                    ringMat.color.setHex(0xff00ff);
                    chargeMat.color.setHex(0xff0000); // Anel de carga fica vermelho no reset
                    cursorGroup.scale.set(1.5, 1.5, 1);
                } else if (data.gesture === "pinch") {
                    ringMat.color.setHex(0x00ff00);
                    chargeMat.color.setHex(0x00ff00);
                    cursorGroup.scale.set(0.6, 0.6, 1);
                } else if (data.gesture === "thumbs_up") {
                    ringMat.color.setHex(0xffff00);
                } else {
                    ringMat.color.setHex(0x00f2ff);
                    cursorGroup.scale.set(1, 1, 1);
                }
                cursorGroup.position.x += (targetX - cursorGroup.position.x) * 0.12;
                cursorGroup.position.y += (targetY - cursorGroup.position.y) * 0.12;
            }

            let ws;
            function connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws/hud`);
                ws.onopen = () => addLog("HUD_CONNECTED: SYNC_READY", "var(--accent-color)");
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.type === 'gesture') updateHUD(data);
                    else if (data.type === 'status_update') {
                        document.getElementById('status').innerText = data.message;
                        addLog(data.message, "var(--warn-color)");
                        if (data.message === "SYSTEM_CORE: MEMORY_PURGED") {
                            hideBrowser(); lastSuggestedQuery = "";
                            addLog("HUD_STATE: CACHE_CLEARED", "var(--accent-color)");
                        }
                    } else if (data.type === 'browser_screenshot') { showBrowser(data.data); }
                    else if (data.text) {
                        const cleanText = cleanTacticalText(data.text);
                        addLog(`ANALYSIS: ${cleanText}`, '#fff'); speak(cleanText);
                    }
                };
                ws.onclose = () => setTimeout(connect, 3000);
            }

            async function runAnalyze(autoSearch = false) {
                if (!isVisionActive || !videoElement) { addLog("SCAN_ERROR: SENSORS_OFFLINE", "var(--warn-color)"); return; }
                const flash = document.getElementById('flash-effect');
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);
                addLog("SCAN_INITIATED...", "var(--text-color)");
                try {
                    const canvas = document.createElement("canvas");
                    canvas.width = videoElement.videoWidth; canvas.height = videoElement.videoHeight;
                    canvas.getContext("2d").drawImage(videoElement, 0, 0);
                    const imgB64 = canvas.toDataURL("image/jpeg", 0.72).split(",")[1];
                    const res = await fetch("/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ image: imgB64 }) });
                    const data = await res.json();
                    if (data.text) {
                        addLog(`ANALYSIS: ${cleanTacticalText(data.text)}`, "#fff"); speak(data.text);
                        if (data.suggested_query) {
                            lastSuggestedQuery = data.suggested_query;
                            addLog(`AGENT: SUGGESTED RESEARCH -> [${lastSuggestedQuery.toUpperCase()}]`, "var(--accent-color)");
                            addLog("USER_INPUT: PINCH (CHARGE) OR VOICE 'YES' TO EXECUTE", "var(--accent-color)");
                        }
                    }
                } catch (err) { addLog("SCAN_ERROR", "var(--warn-color)"); }
            }

            function sendCommand(cmd) {
                const q = document.getElementById("search-box").value;
                if (cmd === "analyze_and_search") {
                    if (q && ws?.readyState === 1) ws.send(JSON.stringify({ type: "command", command: "analyze_and_search", query: q }));
                    else runAnalyze(true);
                } else if (ws?.readyState === 1) { 
                    if (cmd === "close_browser") hideBrowser();
                    ws.send(JSON.stringify({ type: "command", command: cmd })); 
                }
            }

            function speak(text) { if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; window.speechSynthesis.speak(u); } }
            function addLog(text, color = "var(--text-color)") {
                const console = document.getElementById('log-console');
                const entry = document.createElement('div');
                entry.className = 'log-entry'; entry.innerText = `> ${text}`; entry.style.color = color;
                console.appendChild(entry); console.scrollTop = console.scrollHeight;
                if (console.childNodes.length > 50) console.firstChild.remove();
            }
            function hideBrowser() { document.getElementById('browser-view').style.display = 'none'; }
            function showBrowser(base64Data) {
                addLog("RENDER_SUCCESS", "var(--accent-color)");
                document.getElementById('browser-content').src = `data:image/jpeg;base64,${base64Data}`;
                document.getElementById('browser-view').style.display = 'flex';
            }

            function cleanTacticalText(t) { return t ? t.replace(/[\*#\-_\[\]\(\)>]/g, "").replace(/\s+/g, " ").toUpperCase() : ""; }
            function animate() { requestAnimationFrame(animate); cursorGroup.children[0].rotation.z += 0.02; renderer.render(scene, camera); }
            animate(); connect();
        </script>
    </body>
</html>
